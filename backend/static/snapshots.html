<!doctype html>
<html lang="zh-CN" class="auth-pending">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SGUProfiler · 快照</title>
    <script>
    (function(){try{var t=localStorage.getItem('sgu_theme');if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
    </script>
    <link rel="stylesheet" href="/css/app.css?v=3" />
    <script defer src="/js/app.js?v=3"></script>
    <script defer src="/js/snapshots.js?v=3"></script>
</head>
<body class="page-app">
<header class="app-header">
    <div class="app-header__inner">
        <div class="header-row--brand">
            <div class="brand">
                <span class="brand__title">SGUProfiler</span>
                <span class="brand__tag">快照列表与 JSON 详情</span>
            </div>
            <div class="session-slot">
                <span id="sessionBadge" class="muted small hidden" aria-live="polite"></span>
                <button id="navLogoutBtn" type="button" class="hidden">退出</button>
            </div>
        </div>
        <nav class="topnav" aria-label="主导航">
            <a data-nav href="/">首页</a>
            <a data-nav href="/snapshots.html">快照</a>
            <a data-nav href="/analysis.html">分析</a>
            <a data-nav href="/admin/profiler-allowlist.html">命令白名单</a>
            <a data-nav href="/admin/users.html">用户</a>
        </nav>
    </div>
</header>

<div class="shell">
    <h1 class="page-title">快照</h1>
    <p class="page-lead">
        请用游戏内 <code>/SGUProfiler profile start</code> 开始采样；采样结束用 <code>/SGUProfiler profile stop</code> 结束采样。
    </p>

    <div class="split">
        <div class="panel">
            <h2 class="subhead">列表</h2>
            <p class="muted small field-hint">选择一条后点击「加载详情」。</p>
            <div class="row-actions">
                <button id="reloadListBtn" type="button" class="primary">刷新列表</button>
                <button id="loadDetailsBtn" type="button" class="primary">加载详情</button>
                <button id="shareSnapshotBtn" type="button">生成只读分享链接</button>
            </div>
            <div class="row-actions row-actions--toolbar">
                <button id="deleteSnapshotBtn" type="button" class="primary sgu-btn-danger">删除选中采样</button>
                <span class="muted small field-hint">删除后不可恢复，相关分享链接失效。</span>
            </div>
            <label class="muted small" for="snapSelect">索引（最近约 500 条）</label>
            <select id="snapSelect" size="16" aria-label="快照列表"></select>
        </div>
        <div class="panel">
            <h2 class="subhead">详情</h2>
            <p class="muted small field-hint">实体采样（entity_lag_v1）可查看表格摘要；其它类型仅显示 JSON。可生成只读分享链接。</p>
            <div id="detailRendered" class="hidden" aria-live="polite"></div>
            <pre id="details" class="pre-wrap" aria-live="polite">在此显示 JSON…</pre>
        </div>
    </div>
</div>
</body>
</html>
