<!doctype html>
<html lang="zh-CN" class="auth-pending">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SGUProfiler · 用户</title>
    <script>
    (function(){try{var t=localStorage.getItem('sgu_theme');if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
    </script>
    <link rel="stylesheet" href="/css/app.css?v=3" />
    <script defer src="/js/app.js?v=3"></script>
</head>
<body class="page-app">
<header class="app-header">
    <div class="app-header__inner">
        <div class="header-row--brand">
            <div class="brand">
                <span class="brand__title">SGUProfiler</span>
                <span class="brand__tag">管理员 · 新建子账号</span>
            </div>
            <div class="session-slot">
                <span id="sessionBadge" class="muted small hidden" aria-live="polite"></span>
                <button id="navLogoutBtn" type="button" class="hidden">退出</button>
            </div>
        </div>
        <nav class="topnav" aria-label="主导航">
            <a data-nav href="/">首页</a>
            <a data-nav href="/snapshots.html">快照</a>
            <a data-nav href="/analysis.html">分析</a>
            <a data-nav href="/admin/profiler-allowlist.html">命令白名单</a>
            <a data-nav href="/admin/users.html">用户</a>
        </nav>
    </div>
</header>

<div class="shell">
    <h1 class="page-title">用户管理</h1>
    <p class="page-lead">
        仅限 <strong>管理员</strong> 调用后端 <code>/api/v1/users</code>。
        子账号默认非管理员。
    </p>

    <div class="panel panel-narrow">
        <form id="createUserForm" class="form-stack" autocomplete="off">
            <label class="muted small" for="nu">新用户名</label>
            <input id="nu" type="text" autocomplete="off" />
            <label class="muted small" for="np">新密码（不少于 6 位）</label>
            <input id="np" type="password" autocomplete="new-password" />
            <div class="row-actions">
                <button class="primary" type="submit">创建用户</button>
            </div>
        </form>
        <div class="note-box small muted">
            未取得管理员权限时会返回 <code>403</code>。请使用管理员账号登录。
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const SGU = window.SGU;

        let __usersFallbackSeq = 0;
        function fallbackAlertModal(msg, titleText) {
            if (!document.body) return;
            const text = String(msg || "");
            const titleStr = titleText || "提示";
            const titleId = "sgu-users-fallback-" + String(++__usersFallbackSeq);
            const backdrop = document.createElement("div");
            backdrop.className = "sgu-modal-backdrop";
            backdrop.setAttribute("role", "alertdialog");
            backdrop.setAttribute("aria-modal", "true");
            backdrop.setAttribute("aria-labelledby", titleId);
            const box = document.createElement("div");
            box.className = "sgu-modal-box";
            const title = document.createElement("h3");
            title.id = titleId;
            title.className = "sgu-modal-title";
            title.textContent = titleStr;
            const body = document.createElement("p");
            body.className = "sgu-modal-body";
            body.textContent = text;
            const actions = document.createElement("div");
            actions.className = "sgu-modal-actions";
            const ok = document.createElement("button");
            ok.type = "button";
            ok.className = "primary";
            ok.textContent = "确定";
            actions.appendChild(ok);
            box.appendChild(title);
            box.appendChild(body);
            box.appendChild(actions);
            backdrop.appendChild(box);
            document.body.appendChild(backdrop);
            function close() {
                document.removeEventListener("keydown", onKey);
                backdrop.classList.remove("sgu-modal-backdrop--show");
                window.setTimeout(() => backdrop.remove(), 220);
            }
            function onKey(ev) {
                if (ev.key === "Escape" || ev.key === "Enter") close();
            }
            document.addEventListener("keydown", onKey);
            backdrop.addEventListener("click", (ev) => {
                if (ev.target === backdrop) close();
            });
            ok.addEventListener("click", close);
            requestAnimationFrame(() => {
                backdrop.classList.add("sgu-modal-backdrop--show");
                ok.focus();
            });
        }

        function fail(msg) {
            const text = String(msg);
            if (SGU && typeof SGU.alertModal === "function") {
                SGU.alertModal(text, { title: "错误" });
            } else {
                fallbackAlertModal(text, "错误");
            }
        }

        if (!SGU || !SGU.whenReady) {
            fail("页面核心脚本未加载成功，请检查 /js/app.js（同域加载）。");
            document.documentElement.classList.remove("auth-pending");
            return;
        }

        await SGU.whenReady;

        document.documentElement.classList.remove("auth-pending");
        document.documentElement.classList.remove("auth-redirect");

        document.getElementById("createUserForm")?.addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("nu").value.trim();
            const password = document.getElementById("np").value;
            try {
                await SGU.api("/api/v1/users", {
                    method: "POST",
                    body: JSON.stringify({ username, password }),
                });
                SGU.alertModal("创建成功（已写入 data/users.json）", { title: "成功" });
                document.getElementById("nu").value = "";
                document.getElementById("np").value = "";
            } catch (err) {
                fail("创建失败：" + String(err.message || err));
            }
        });
    });
</script>
</body>
</html>
