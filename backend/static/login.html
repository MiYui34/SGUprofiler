<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SGUProfiler · 登录</title>
    <script>
    (function(){try{var t=localStorage.getItem('sgu_theme');if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
    </script>
    <link rel="stylesheet" href="/css/app.css?v=3" />
    <script defer src="/js/app.js?v=3"></script>
    <script defer src="/js/login-page.js?v=3"></script>
</head>
<body class="login-page">
<noscript>
    <p class="login-noscript-banner">
        未启用 JavaScript 时将使用常规表单正文提交；若在 Cursor 内置浏览器中失败，请开启脚本。
    </p>
</noscript>

<div class="login-backdrop" aria-hidden="true"></div>

<main class="login-modal" role="main" aria-labelledby="loginTitle">
    <div class="login-modal__header">
        <span class="login-modal__logo" aria-hidden="true">◆</span>
        <div>
            <h1 id="loginTitle" class="login-modal__title">SGUProfiler</h1>
            <p class="login-modal__subtitle">登录后查看快照与后台数据</p>
        </div>
    </div>

    <div
        id="loginFlash"
        class="login-flash hidden"
        role="alert"
        aria-hidden="true"
    >
        <span id="loginFlashText"></span>
        <button type="button" class="login-flash__close" id="loginFlashDismiss" aria-label="关闭提示">
            ×
        </button>
    </div>

    <form
        id="loginForm"
        class="login-form form-stack"
        method="post"
        action="/api/v1/auth/login"
        enctype="application/x-www-form-urlencoded"
        autocomplete="off"
        novalidate
    >
        <input type="hidden" name="next" id="loginNext" value="/snapshots.html" />
        <label class="login-form__label muted small" for="user">用户名</label>
        <input
            id="user"
            class="login-form__input"
            type="text"
            name="username"
            autocomplete="username"
            required
            placeholder="输入用户名"
        />
        <label class="login-form__label muted small" for="pass">密码</label>
        <input
            id="pass"
            class="login-form__input"
            type="password"
            name="password"
            autocomplete="current-password"
            required
            placeholder="输入密码"
        />
        <div class="login-form__actions">
            <button class="login-form__submit primary" type="submit" id="loginSubmitBtn">登录</button>
        </div>
    </form>
</main>
</body>
</html>
