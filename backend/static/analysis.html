<!doctype html>
<html lang="zh-CN" class="auth-pending">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SGUProfiler · 卡顿分析</title>
    <script>
    (function(){try{var t=localStorage.getItem('sgu_theme');if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
    </script>
    <link rel="stylesheet" href="/css/app.css?v=3" />
    <script defer src="/js/app.js?v=3"></script>
    <script defer src="/js/analysis.js?v=3"></script>
</head>
<body class="page-app">
<header class="app-header">
    <div class="app-header__inner">
        <div class="header-row--brand">
            <div class="brand">
                <span class="brand__title">SGUProfiler</span>
                <span class="brand__tag">实体 TICK 卡顿分析 · 默认展示总耗时</span>
            </div>
            <div class="session-slot">
                <span id="sessionBadge" class="muted small hidden" aria-live="polite"></span>
                <button id="navLogoutBtn" type="button" class="hidden">退出</button>
            </div>
        </div>
        <nav class="topnav" aria-label="主导航">
            <a data-nav href="/">首页</a>
            <a data-nav href="/snapshots.html">快照</a>
            <a data-nav href="/analysis.html">分析</a>
            <a data-nav href="/admin/profiler-allowlist.html">命令白名单</a>
            <a data-nav href="/admin/users.html">用户</a>
        </nav>
    </div>
</header>

<div class="shell">
    <h1 class="page-title">卡顿分析</h1>
    <p class="page-lead">
        选择快照后自动解析「实体-卡顿-数值」格式，默认按实体展示 TICK 总卡顿；点击展开查看详细子项。
    </p>

    <div class="split">
        <div class="panel">
            <h2 class="subhead">快照列表</h2>
            <div class="row-actions">
                <button id="reloadListBtn" type="button" class="primary">刷新</button>
            </div>
            <div class="row-actions row-actions--toolbar">
                <button id="deleteSnapshotBtn" type="button" class="primary sgu-btn-danger">删除选中采样</button>
                <span class="muted small field-hint">与「快照」页相同，删除后不可恢复。</span>
            </div>
            <label class="muted small" for="snapSelect">最近快照</label>
            <select id="snapSelect" size="14" aria-label="快照列表"></select>
            <button id="loadAnalysisBtn" type="button" class="primary" style="margin-top:10px;width:100%;">加载分析</button>
        </div>
        <div class="panel">
            <h2 class="subhead">分析视图 <span id="currentSnap" class="muted small"></span></h2>
            <div id="analysisSummary" class="analysis-summary"></div>
            <div id="analysisAccordion" class="analysis-accordion" aria-live="polite"></div>
            <pre id="rawData" class="pre-wrap hidden" style="margin-top:16px;max-height:260px;overflow:auto;"></pre>
        </div>
    </div>
</div>
</body>
</html>
